<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Chat - Phoenix OB1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0f0f1a;
            color: #a855f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #1a1a2e;
            padding: 1rem;
            border-bottom: 2px solid #a855f7;
            text-align: center;
        }
        
        h1 {
            color: #f59e0b;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        
        .status {
            font-size: 0.8rem;
            color: #a855f7;
            margin-top: 0.5rem;
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .user {
            background: #1a1a2e;
            border: 1px solid #a855f7;
            align-self: flex-end;
            color: #f59e0b;
        }
        
        .assistant {
            background: #2a2a3e;
            border: 1px solid #f59e0b;
            align-self: flex-start;
            color: #a855f7;
        }
        
        .error {
            background: #3a1a1a;
            border: 1px solid #ef4444;
            color: #ef4444;
            align-self: center;
            max-width: 90%;
        }
        
        #input-container {
            padding: 1rem;
            background: #1a1a2e;
            border-top: 2px solid #a855f7;
            display: flex;
            gap: 1rem;
        }
        
        #message-input {
            flex: 1;
            padding: 0.75rem;
            background: #0f0f1a;
            border: 1px solid #a855f7;
            color: #a855f7;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            border-radius: 4px;
        }
        
        #message-input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        
        #send-button {
            padding: 0.75rem 2rem;
            background: #a855f7;
            color: #0f0f1a;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        #send-button:hover {
            background: #f59e0b;
        }
        
        #send-button:disabled {
            background: #4a4a5e;
            cursor: not-allowed;
        }
        
        .loading {
            color: #f59e0b;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚡ PHOENIX OB1 - MAGIC CHAT ⚡</h1>
        <div class="status" id="status">Reality-C | Gospel 444 | B1 Testing</div>
    </header>
    
    <div id="chat-container"></div>
    
    <div id="input-container">
        <input 
            type="text" 
            id="message-input" 
            placeholder="Talk to Obi..." 
            autocomplete="off"
        />
        <button id="send-button">SEND</button>
    </div>
    
    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const statusDiv = document.getElementById('status');
        
        // Generate session ID (persistent in this tab)
        let sessionId = sessionStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('sessionId', sessionId);
        }
        
        // Add message to chat
        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.textContent = content;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Send message to Obi
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage('user', message);
            messageInput.value = '';
            sendButton.disabled = true;
            
            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = 'Obi thinking...';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, sessionId })
                });
                
                loadingDiv.remove();
                
                if (!response.ok) {
                    const error = await response.json();
                    addMessage('error', `Error: ${error.error || 'Unknown error'}`);
                    if (error.hint) {
                        addMessage('error', `Hint: ${error.hint}`);
                    }
                    return;
                }
                
                const data = await response.json();
                addMessage('assistant', data.reply);
                
            } catch (err) {
                loadingDiv.remove();
                addMessage('error', `Network error: ${err.message}`);
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }
        
        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Check health on load
        fetch('/health')
            .then(r => r.json())
            .then(data => {
                statusDiv.textContent = `Reality-${data.reality} | Gospel ${data.gospel} | v${data.version} | Gemini: ${data.gemini}`;
                if (data.gemini === 'missing') {
                    addMessage('error', 'WARNING: GEMINI_API_KEY not configured. Set it in Cloudflare dashboard before testing.');
                }
            })
            .catch(() => {
                statusDiv.textContent = 'Health check failed';
            });
        
        // Welcome message
        addMessage('assistant', 'Obi online. Gospel 444 enforced. Ready for B1 sentience test.');
        messageInput.focus();
    </script>
</body>
</html>
