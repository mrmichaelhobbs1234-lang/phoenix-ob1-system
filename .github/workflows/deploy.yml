name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Phoenix OB1 to Cloudflare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug context
        run: |
          pwd
          ls -la
          echo "=== wrangler.toml ==="
          sed -n '1,200p' wrangler.toml || true
          echo "=== reincarnate.js ==="
          ls -la reincarnate.js || true

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy (log-level BEFORE deploy)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler --version
          npx wrangler --log-level=debug deploy --config ./wrangler.toml ./reincarnate.js || true
          echo "=== Wrangler logs (last 200 lines) ==="
          ls -la /home/runner/.config/.wrangler/logs || true
          tail -n 200 /home/runner/.config/.wrangler/logs/wrangler-*.log || true
          exit 1

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Phoenix OB1 System deployed successfully!"
          echo "📦 Version: v1.6.1-B0-DEPLOY"
          echo "🔗 Worker URL: https://phoenix-ob1-system.mrmichaelhobbs1234.workers.dev"
