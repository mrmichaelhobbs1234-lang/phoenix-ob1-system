name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Phoenix OB1 to Cloudflare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Wrangler version check
        run: npx wrangler --version

      - name: Deploy to Cloudflare Workers (verbose)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🔍 Starting verbose deployment..."
          echo "Account ID: ${CLOUDFLARE_ACCOUNT_ID:0:8}..."
          echo "Token present: $([ -n "$CLOUDFLARE_API_TOKEN" ] && echo 'YES' || echo 'NO')"
          npx wrangler deploy --log-level=debug

      - name: Deployment Summary
        run: |
          echo "✅ Phoenix OB1 System deployed successfully!"
          echo "📦 Version: v1.6-AUTH-ENFORCED"
          echo "🔗 Worker URL: https://phoenix-ob1-system.mrmichaelhobbs1234.workers.dev"
          echo "🔐 Auth: ENFORCED (x-sovereign-key required)"
