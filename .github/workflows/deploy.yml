name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Phoenix OB1 to Cloudflare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug context
        run: |
          pwd
          ls -la
          echo "=== wrangler.toml ==="
          sed -n '1,50p' wrangler.toml || true
          echo "=== reincarnate.js ==="
          ls -la reincarnate.js || true

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: |
          npx wrangler --version
          npx wrangler deploy --config ./wrangler.toml ./reincarnate.js 2>&1 | tee wrangler.out
          echo "=== REAL_URL_LINES ==="
          grep -E "workers.dev|https://|Deployed|Uploaded|Current Deployment|Name:" wrangler.out || true

      - name: Print Wrangler logs on failure
        if: failure()
        run: |
          echo "=== Wrangler logs (last 200 lines) ==="
          ls -la /home/runner/.config/.wrangler/logs || true
          tail -n 200 /home/runner/.config/.wrangler/logs/wrangler-*.log || true

      - name: Deployment Summary
        if: success()
        run: |
          NAME=$(grep -E '^name\\s*=' wrangler.toml | head -n1 | cut -d'"' -f2)
          echo "✅ Deploy finished"
          echo "Worker Name: $NAME"
          echo "Copy the REAL workers.dev URL from the REAL_URL_LINES block above."
