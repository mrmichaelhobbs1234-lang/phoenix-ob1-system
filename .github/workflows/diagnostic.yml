name: Diagnostic - Wrangler Account Info

on:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Run wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== WRANGLER WHOAMI ==="
          npx wrangler whoami || echo "whoami failed"
          echo ""
          echo "=== DEPLOYMENTS LIST ==="
          npx wrangler deployments list || echo "deployments list failed"
          echo ""
          echo "=== ACCOUNT INFO ==="
          echo "CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID"

      - name: Write diagnostic output
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "# Diagnostic Output" > DIAGNOSTIC_OUTPUT.txt
          echo "Generated: $(date)" >> DIAGNOSTIC_OUTPUT.txt
          echo "" >> DIAGNOSTIC_OUTPUT.txt
          echo "## Wrangler Whoami" >> DIAGNOSTIC_OUTPUT.txt
          npx wrangler whoami >> DIAGNOSTIC_OUTPUT.txt 2>&1 || echo "Failed" >> DIAGNOSTIC_OUTPUT.txt
          echo "" >> DIAGNOSTIC_OUTPUT.txt
          echo "## Deployments List" >> DIAGNOSTIC_OUTPUT.txt
          npx wrangler deployments list >> DIAGNOSTIC_OUTPUT.txt 2>&1 || echo "Failed" >> DIAGNOSTIC_OUTPUT.txt
          echo "" >> DIAGNOSTIC_OUTPUT.txt
          echo "## Account ID" >> DIAGNOSTIC_OUTPUT.txt
          echo "$CLOUDFLARE_ACCOUNT_ID" >> DIAGNOSTIC_OUTPUT.txt

      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DIAGNOSTIC_OUTPUT.txt || true
          git commit -m "[Diagnostic] Wrangler account info" || echo "No changes"
          git push || echo "Push failed"
